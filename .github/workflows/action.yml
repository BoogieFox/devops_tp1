name: CI - Kubernetes Integration Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  actions: read
  security-events: write
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Unit and Web Tests
        run: |
          cd devops_tp1
          chmod +x gradlew
          ./gradlew test

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: 'devops_tp1/build/test-results/**/*.xml'

      - name: Build Docker images
        run: |
          docker build -t devops_tp1:latest ./devops_tp1
